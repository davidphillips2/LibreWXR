name: Sync fork with upstream

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Sync upstream
        run: |
          git remote add upstream https://github.com/JoshuaKimsey/LibreWXR.git
          git fetch upstream main
          git merge upstream/main --no-edit
          git push
